<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Crossing — GenX Leadership Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@1&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --porcelain:#F6F3EC;
    --porcelain-2:#EFEBE1;
    --ink:#1B1D3A;
    --cobalt:#2C4BF0;
    --cobalt-soft:#5C76F5;
    --slate:#8A90A8;
    --terracotta:#C8694A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--porcelain);
    color:var(--ink);
    font-family:"Schibsted Grotesk",sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 24px;
    -webkit-font-smoothing:antialiased;
  }
  .stage{
    width:100%;
    max-width:880px;
    text-align:center;
  }

  /* ---- the mark ---- */
  .mark-wrap{
    position:relative;
    width:min(360px,72vw);
    margin:0 auto 40px;
    aspect-ratio:1/1;
  }
  svg{width:100%;height:100%;display:block;overflow:visible}

  .path-slate, .path-cobalt{
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .path-slate{
    stroke:var(--slate);
    stroke-width:13;
  }
  .path-cobalt{
    stroke:var(--cobalt);
    stroke-width:16;
  }
  .arrowhead{
    fill:none;
    stroke:var(--cobalt);
    stroke-width:16;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .node{
    fill:var(--cobalt);
  }
  .node-glow{
    fill:var(--cobalt-soft);
  }

  /* ---- animation ---- */
  .path-slate{
    stroke-dasharray:360;
    stroke-dashoffset:360;
    animation:draw 1.1s cubic-bezier(.6,.1,.3,1) .2s forwards;
  }
  .path-cobalt{
    stroke-dasharray:520;
    stroke-dashoffset:520;
    animation:draw 1.5s cubic-bezier(.55,.08,.3,1) 1.0s forwards;
  }
  .arrowhead{
    opacity:0;
    animation:pop .5s ease-out 2.35s forwards;
  }
  .node, .node-glow{ opacity:0 }
  .node{ animation:pop .45s ease-out 2.0s forwards }
  .node-glow{ animation:pulse 2.6s ease-in-out 2.2s infinite }

  @keyframes draw{ to{ stroke-dashoffset:0 } }
  @keyframes pop{
    0%{opacity:0;transform:scale(.4)}
    70%{opacity:1;transform:scale(1.12)}
    100%{opacity:1;transform:scale(1)}
  }
  @keyframes pulse{
    0%,100%{opacity:.0;transform:scale(.9)}
    50%{opacity:.45;transform:scale(1.5)}
  }
  /* transform-origin for the node group */
  .node, .node-glow{ transform-box:fill-box; transform-origin:center }
  .arrowhead{ transform-box:fill-box; transform-origin:center }

  /* ---- wordmark ---- */
  .wordmark{
    font-weight:600;
    letter-spacing:.22em;
    font-size:clamp(15px,2.6vw,21px);
    text-transform:uppercase;
    color:var(--ink);
  }
  .wordmark .gen{color:var(--cobalt)}
  .tagline{
    margin-top:14px;
    font-family:"Instrument Serif",serif;
    font-style:italic;
    font-size:clamp(18px,3vw,24px);
    color:var(--slate);
  }

  /* ---- caption for Sara ---- */
  .legend{
    margin-top:56px;
    display:flex;
    gap:14px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .chip{
    font-family:"Instrument Sans",sans-serif;
    font-size:13px;
    color:var(--ink);
    background:var(--porcelain-2);
    border:1px solid rgba(27,29,58,.08);
    padding:10px 16px;
    border-radius:100px;
    display:flex;
    align-items:center;
    gap:9px;
  }
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .dot.slate{background:var(--slate)}
  .dot.cobalt{background:var(--cobalt)}
  .dot.node{background:var(--cobalt-soft)}

  .replay{
    margin-top:34px;
    font-family:"Instrument Sans",sans-serif;
    font-size:13px;
    letter-spacing:.04em;
    color:var(--slate);
    background:none;
    border:1px solid rgba(27,29,58,.14);
    padding:9px 20px;
    border-radius:100px;
    cursor:pointer;
    transition:color .2s,border-color .2s;
  }
  .replay:hover{color:var(--cobalt);border-color:var(--cobalt)}
  .replay:focus-visible{outline:2px solid var(--cobalt);outline-offset:3px}

  @media(prefers-reduced-motion:reduce){
    .path-slate,.path-cobalt{animation:none;stroke-dashoffset:0}
    .arrowhead,.node{animation:none;opacity:1}
    .node-glow{animation:none;opacity:.25}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="mark-wrap" id="markWrap">
      <svg viewBox="0 0 400 400" role="img" aria-label="GenX Leadership Academy crossing mark">
        <!-- glowing convergence node (behind) -->
        <circle class="node-glow" cx="200" cy="205" r="26"/>

        <!-- SLATE: the descent — uncertainty falling away (straight, calm, no arrowhead) -->
        <path class="path-slate" d="M 78 96 L 300 322"/>

        <!-- COBALT: the journey — starts low, sits in the valley, then breaks upward -->
        <path class="path-cobalt" d="M 84 300 C 120 332, 162 300, 200 205 C 232 124, 268 96, 318 70"/>

        <!-- arrowhead at the single culminating peak -->
        <path class="arrowhead" d="M 288 88 L 320 68 L 318 104"/>

        <!-- the crossing node (in front) -->
        <circle class="node" cx="200" cy="205" r="11"/>
      </svg>
    </div>

    <div class="wordmark"><span class="gen">GENX</span> LEADERSHIP ACADEMY</div>
    <div class="tagline">from uncertainty, the crossing</div>

    <div class="legend">
      <span class="chip"><span class="dot slate"></span>Slate descends — the uncertainty</span>
      <span class="chip"><span class="dot node"></span>The crossing — the turning point</span>
      <span class="chip"><span class="dot cobalt"></span>Cobalt rises — the breakthrough</span>
    </div>

    <button class="replay" id="replay">↻ Replay the crossing</button>
  </div>

<script>
  document.getElementById('replay').addEventListener('click', ()=>{
    const wrap = document.getElementById('markWrap');
    const clone = wrap.cloneNode(true);
    clone.id = 'markWrap';
    wrap.replaceWith(clone);
  });
</script>
</body>
</html>
